# Hermes 多账户（账户隔离，非请示时临时切换）
# cp trade_accounts.example.yaml data/trade_accounts.yaml

version: 2

# 初始建议：仅启用模拟盘；实盘默认 Hermes 不操盘（用户 start 后才启用）
initial_hermes_trading_active:
  - paper_easyths

initial_desk_primary_account: paper_easyths

wechat:
  default_chat_id: "o9cq80xH5gzWPO5LmfGmL-8Lw6X8@im.wechat"

accounts:
  manual_wechat:
    label: "微信实盘（用户自行下单）"
    enabled: true
    position_source: stock_kb_guard
    execution:
      provider: none
      auto_execute_on_resolve: false
    wechat:
      on_propose: true
      on_execution_result: false
    note: "持仓来自 trade_log/stock_kb/guard_config；Hermes 仅请示，不代下单。"

  paper_easyths:
    label: "EasyTHS 模拟盘（Hermes 自动执行）"
    enabled: true
    position_source: easyths
    execution:
      provider: easyths
      auto_execute_on_resolve: true
      easyths_config: "/config/quant_scripts/data/easyths_trade.yaml"
      expected_mode: paper
    wechat:
      on_propose: true
      on_execution_result: true
    note: "持仓/盈亏仅来自 EasyTHS paper；与 manual 账户数据完全隔离。"
