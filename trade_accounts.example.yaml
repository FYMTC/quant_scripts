# Hermes 多账户（EasyTHS 为唯一权威交易源）
# cp trade_accounts.example.yaml data/trade_accounts.yaml

version: 2

# 初始建议：仅启用模拟盘；实盘默认 Hermes 不操盘（用户 start 后才启用）
initial_hermes_trading_active:
  - paper_easyths

initial_desk_primary_account: paper_easyths

wechat:
  default_chat_id: "o9cq80xH5gzWPO5LmfGmL-8Lw6X8@im.wechat"

accounts:
  paper_easyths:
    label: "EasyTHS 模拟盘（Hermes 自动执行）"
    enabled: true
    position_source: easyths
    guard_config_path: "/config/quant_scripts/data/guard_configs/paper_easyths.json"
    position_cache_path: null
    stock_kb_book: audit_only
    execution:
      provider: easyths
      auto_execute_on_resolve: true
      easyths_config: "/config/quant_scripts/data/easyths_trade.yaml"
      expected_mode: paper
    wechat:
      on_propose: true
      on_execution_result: true
    note: "持仓/盈亏仅来自 EasyTHS paper；本地只保留快照与配置。"
